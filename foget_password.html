<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/login.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      html,
      body {
        height: 100%;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e5e7eb;
        overflow-x: hidden;
      }

      header {
        background: linear-gradient(90deg, #020617, #1e293b);
        height: 80px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: 0 8px 25px rgba(56, 189, 248, 0.25);
      }

      #logo {
        width: 150px;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }

      .nav {
        display: flex;
        gap: 30px;
        align-items: center;
      }

      .nav a {
        text-decoration: none;
        color: #cbd5f5;
        transition: 0.3s ease;
      }

      .nav a:hover {
        color: #38bdf8;
      }

      .menu-icon {
        display: none;
        font-size: 28px;
        color: #cbd5f5;
        cursor: pointer;
      }

      .main-login {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 150px;
        gap: 100px;
        flex-wrap: wrap;
      }

      .main-login .image img {
        width: 400px;
        border-radius: 12px;
        animation: fadeIn 1.5s ease-in-out;
      }

      .login-container {
        background: #111827;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 350px;
        text-align: center;
        animation: fadeIn 1.5s ease-in-out;
      }

      .login-container .logo h1 {
        color: #38bdf8;
        margin-bottom: 20px;
      }

      .input-group {
        position: relative;
        margin-bottom: 20px;
      }

      .input-group i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
      }

      input {
        width: 100%;
        padding: 15px 15px 15px 45px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #1e293b;
        color: #e5e7eb;
        font-size: 16px;
        box-sizing: border-box;
      }

      input::placeholder {
        color: #94a3b8;
      }

      input:focus {
        border-color: #38bdf8;
        outline: none;
        box-shadow: 0 0 5px rgba(56, 189, 248, 0.5);
      }

      .login-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #4caf50, #38bdf8);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
      }

      .login-btn:hover {
        background: linear-gradient(135deg, #38bdf8, #4caf50);
      }

      .links {
        margin-top: 20px;
      }

      .links a {
        color: #38bdf8;
        text-decoration: none;
        margin: 0 10px;
        font-size: 14px;
      }

      .links a:hover {
        text-decoration: underline;
      }

      footer {
        background-color: #020617;
        color: #cbd5f5;
        padding: 40px 0 20px;
        margin-top: 200px;
      }

      .footer-container {
        width: 95%;
        max-width: 1400px;
        margin: auto;
        display: flex;
        justify-content: space-between;
        gap: 40px;
        flex-wrap: wrap;
      }

      .footer-box {
        flex: 1;
        min-width: 200px;
      }

      .footer-box h3 {
        color: #38bdf8;
        margin-bottom: 15px;
      }

      .footer-box p,
      .footer-box a {
        color: #cbd5f5;
        line-height: 1.6;
        text-decoration: none;
      }

      .footer-box a:hover {
        color: #38bdf8;
      }

      .social-icons i {
        font-size: 22px;
        margin-right: 15px;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .social-icons i:hover {
        color: #38bdf8;
      }

      .footer-bottom {
        text-align: center;
        margin-top: 30px;
        font-size: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        padding-top: 15px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Media Queries */
      @media (max-width: 991px) {
        .nav {
          display: none;
        }
        .menu-icon {
          display: block;
        }
        .nav.active {
          display: flex;
          flex-direction: column;
          position: absolute;
          top: 80px;
          right: 30px;
          background: #111827;
          padding: 20px;
          border-radius: 8px;
          gap: 20px;
          z-index: 1001;
        }
        .main-login {
          flex-direction: column;
          gap: 50px;
          margin-top: 120px;
        }
        .main-login .image img {
          width: 300px;
        }
      }

      @media (max-width: 767px) {
        #logo {
          width: 120px;
        }
        .login-container {
          width: 90%;
          padding: 20px;
        }
        .main-login .image img {
          width: 250px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="navbar">
        <img
          id="logo"
          src="./Beige And Dark Gray Illustrative Running Sport Logo.png"
          alt="Logo"
        />
        <div class="nav">
          <a href="./explore.html">Explore</a>
          <a href="#">Login</a>
        </div>
        <div class="menu-icon" onclick="toggleMenu()">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </header>

    <main class="main-login">
      <div class="login-container">
        <div class="logo">
          <h1>Reset Your Password</h1>
        </div>
        <p>Enter your current password and a new password below.</p>
        <form action="/update-password" method="post">
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="current-password"
              name="current-password"
              required
              placeholder="Current Password"
            />
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="new-password"
              name="new-password"
              required
              placeholder="New Password"
            />
          </div>
          <button type="submit" class="login-btn">Update Password</button>
        </form>
        <div class="links">
          <a href="./login.html">Back to Login</a>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-container">
        <div class="footer-box">
          <h3>About Us</h3>
          <p>We provide secure and reliable services for all your needs.</p>
        </div>
        <div class="footer-box">
          <h3>Quick Links</h3>
          <a href="#">About us</a><br />
          <a href="#">Gallery</a><br />
          <a href="#">Login</a>
        </div>
        <div class="footer-box">
          <h3>Follow Us</h3>
          <div class="social-icons">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2023 Your Company. All rights reserved.</p>
      </div>
    </footer>

    <script>
      function toggleMenu() {
        const nav = document.querySelector(".nav");
        nav.classList.toggle("active");
      }
    </script>
  </body>
</html>
