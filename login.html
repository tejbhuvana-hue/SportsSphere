<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sports Login</title>
    <link rel="stylesheet" href="css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="logo">
          <img
            id="logo"
            src="/images/Beige And Dark Gray Illustrative Running Sport Logo.png"
            alt="Logo"
          />
        </div>

        <div class="nav" id="nav-links">
          <a href="./explore.html"><i class="bi bi-compass-fill"></i>Explore</a>
          <a href="#"><i class="bi bi-box-arrow-in-right"></i>Login</a>
        </div>

        <div class="menu-icon" id="menu-icon">
          <i class="bi bi-list"></i>
        </div>
      </div>
    </header>
    <div class="main-login">
      <div class="image">
        <img
          src="/images/Beige And Dark Gray Illustrative Running Sport Logo.png And Dark Gray Illustrative Running Sport Logo.png"
          alt="logo"
        />
      </div>
      <div class="login-container">
        <div class="logo">
          <i class="fas fa-futbol"></i>
          <h1>SPORTS SPHERE</h1>
        </div>
        <form id="loginForm">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Username"
              required
            />
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              required
            />
          </div>
          <button type="submit" class="login-btn">
            Login
          </button>
        </form>
        <div class="links">
          <a href="./foget_password.html" class="forgot">Forgot Password?</a>
          <a href="./register-page1.html" class="signup">Sign Up</a> <br>
          <a href="https://accounts.google.com/signup" class="signup"
            target="_blank"><i class="bi bi-google" style="margin-right: 5px"></i> Sign up with
            Google</a
          >
        </div>
      </div>
    </div>
    <footer>
      <div class="footer-container">
        <div class="footer-box">
          <h3>SportsSphere</h3>
          <p>Your one-stop platform for sports news, events, and updates.</p>
        </div>

        <div class="footer-box">
          <h3>Quick Links</h3>
          <a href="./explore.html">Explore</a>
          <a href="./about-us.html">About Us</a>
          <a href="#">Contact</a>
        </div>

        <div class="footer-box">
          <h3>Follow Us</h3>
          <div class="social-icons">
            <i class="bi bi-facebook"></i>
            <i class="bi bi-instagram"></i>
            <i class="bi bi-twitter-x"></i>
            <i class="bi bi-youtube"></i>
          </div>
        </div>
      </div>

      <p class="footer-bottom">© 2026 SportsSphere. All Rights Reserved.</p>
    </footer>

    <script src="js/login.js"></script>
  </body>
</html>
